<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Heart Is Yours · 3D 粒子爱心</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 50% 42%, #3a0f2c 0%, #1b0717 38%, #070309 100%);
    font-family: "Georgia", "Songti SC", "STSong", serif;
    cursor: grab;
    overscroll-behavior: none;        /* 禁止下拉刷新干扰触摸 */
    -webkit-tap-highlight-color: transparent;
  }
  body:active { cursor: grabbing; }

  #scene {
    position: fixed; inset: 0; display: block;
    touch-action: none;               /* 拖拽旋转不被浏览器手势抢走 */
  }

  /* —— 小屏微调 —— */
  @media (max-width: 640px) {
    .overlay { padding-bottom: 9vh; }
    .hint   { top: 3.2vh; font-size: .68rem; letter-spacing: .2em; }
    .subtitle { letter-spacing: .25em; margin-top: .6rem; }
  }
  @media (max-width: 640px) and (orientation: landscape) {
    .overlay { padding-bottom: 4vh; }
  }

  /* —— 文字叠层 —— */
  .overlay {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 7vh; text-align: center;
  }
  .title {
    font-style: italic;
    font-size: clamp(2.2rem, 6.5vw, 5rem);
    letter-spacing: .14em;
    color: #ffe1ea;
    text-shadow:
      0 0 18px rgba(255, 90, 130, .9),
      0 0 42px rgba(255, 60, 110, .55),
      0 0 80px rgba(255, 40, 90, .35);
    animation: fadeUp 1.8s cubic-bezier(.2,.7,.2,1) both .4s;
  }
  .subtitle {
    margin-top: .9rem;
    font-size: clamp(.9rem, 1.6vw, 1.25rem);
    letter-spacing: .35em;
    color: rgba(255, 200, 215, .82);
    text-shadow: 0 0 14px rgba(255, 80, 120, .5);
    animation: fadeUp 1.8s cubic-bezier(.2,.7,.2,1) both .9s;
  }
  .hint {
    position: fixed; top: 4.5vh; left: 50%; transform: translateX(-50%);
    font-size: .8rem; letter-spacing: .25em; color: rgba(255, 190, 210, .5);
    animation: fadeIn 2s ease both 1.4s, pulseHint 3s ease-in-out 2.4s infinite;
    pointer-events: none;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulseHint { 0%,100% { opacity: .35; } 50% { opacity: .75; } }

  /* —— 控制开关：跳动 / 闪烁 —— */
  .controls {
    position: fixed; top: 4.5vh; right: 5vw; z-index: 10;
    display: flex; flex-direction: column; gap: .9rem;
    pointer-events: auto;
  }
  .switch {
    display: flex; align-items: center; gap: .6rem;
    cursor: pointer; user-select: none;
    font-size: .82rem; letter-spacing: .2em;
    color: rgba(255, 200, 215, .88);
    text-shadow: 0 0 10px rgba(255, 80, 120, .5);
  }
  .switch input { display: none; }
  .switch .track {
    position: relative;
    width: 42px; height: 22px; border-radius: 22px;
    background: rgba(255, 255, 255, .12);
    border: 1px solid rgba(255, 150, 175, .4);
    box-shadow: inset 0 0 6px rgba(0,0,0,.4);
    transition: background .3s ease, box-shadow .3s ease;
  }
  .switch .thumb {
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: linear-gradient(180deg, #ffd0dd, #ff7a9c);
    box-shadow: 0 0 8px rgba(255, 90, 130, .8);
    transition: transform .3s cubic-bezier(.2,.7,.2,1);
  }
  .switch input:checked + .track {
    background: rgba(255, 60, 110, .35);
    box-shadow: inset 0 0 8px rgba(255, 40, 90, .6), 0 0 14px rgba(255, 80, 120, .5);
  }
  .switch input:checked + .track .thumb { transform: translateX(20px); }

  /* —— 飘落爱心 —— */
  .petal {
    position: fixed; top: -8%; pointer-events: none; user-select: none;
    color: rgba(255, 100, 140, .85);
    filter: drop-shadow(0 0 6px rgba(255, 80, 120, .65));
    animation: fall linear infinite;
    will-change: transform, opacity;
  }
  @keyframes fall {
    0%   { transform: translate3d(0, -10vh, 0) rotate(0deg)   scale(var(--s)); opacity: 0; }
    8%   { opacity: .9; }
    92%  { opacity: .9; }
    100% { transform: translate3d(var(--drift), 112vh, 0) rotate(var(--spin)) scale(var(--s)); opacity: 0; }
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="hint">拖动旋转 · 轻点让它心跳</div>

  <div class="controls">
    <label class="switch">
      <input type="checkbox" id="beatToggle" checked />
      <span class="track"><span class="thumb"></span></span>
      <span>跳动</span>
    </label>
    <label class="switch">
      <input type="checkbox" id="twinkleToggle" checked />
      <span class="track"><span class="thumb"></span></span>
      <span>闪烁</span>
    </label>
  </div>

  <div class="overlay">
    <div class="title">My Heart Is Yours</div>
    <div class="subtitle">一颗心 · 为你而跳</div>
  </div>

  <!-- Three.js（ES Module + importmap） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    /* =========================================================
       1. 基础场景（含移动端适配）
       ========================================================= */
    // 设备识别：UA 或窄屏均视为移动端，按需降低粒子上限与像素比
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
                  || Math.min(window.innerWidth, window.innerHeight) < 768;
    const DPR_CAP = isMobile ? 1.5 : 2;

    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, DPR_CAP));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);

    // 让心形在任何宽高比下都完整入镜：按较窄的那条轴反推相机距离
    const HEART_HALF = 10; // 含脉动与留白的等效半宽
    function fitHeartToView() {
      const aspect  = window.innerWidth / window.innerHeight;
      const halfFov = Math.tan((camera.fov * Math.PI) / 180 / 2);
      const distV = HEART_HALF / halfFov;            // 竖向能容纳
      const distH = HEART_HALF / (halfFov * aspect);  // 横向能容纳
      camera.position.z = Math.max(distV, distH);
      camera.position.y = 0.5;
      camera.aspect = aspect;
      camera.updateProjectionMatrix();
    }
    fitHeartToView();

    /* =========================================================
       2. 用 Taubin 心形隐式方程做「拒绝采样」生成 3D 实体心形点云
          F(x,y,z) = (x² + 9y²/4 + z² - 1)³ - x²z³ - 9y²z³/200
          其中 z 是心形上下轴 → 映射到世界 Y，使其正立
       ========================================================= */
    const HEART_COUNT = isMobile ? 3500 : 6500;   // 降低密度，让每个「潘/火」字不被相邻粒子淹没
    const SCALE = 7.2;

    const palette = [
      '#ff2d6f', '#ff5d8f', '#ff0a54', '#ff85a1',
      '#ffb3c6', '#ffafd0', '#ff7096', '#ff4d6d'
    ].map(c => new THREE.Color(c));
    const hotWhite = new THREE.Color('#ffffff');
    const deepRed  = new THREE.Color('#9b0033');

    const positions = new Float32Array(HEART_COUNT * 3);
    const colors    = new Float32Array(HEART_COUNT * 3);
    const sizes     = new Float32Array(HEART_COUNT);
    const phases    = new Float32Array(HEART_COUNT);
    const charIdx   = new Float32Array(HEART_COUNT);   // 每个粒子用「潘火火」中的哪一个字

    let i = 0, tries = 0;
    while (i < HEART_COUNT && tries < HEART_COUNT * 80) {
      tries++;
      const x = (Math.random() * 2 - 1) * 1.15;   // 左右
      const y = (Math.random() * 2 - 1) * 1.15;   // 心形深度（前后）
      const z = (Math.random() * 2 - 1) * 1.15;   // 上下

      const t = x * x + 2.25 * y * y + z * z - 1;
      const F = t * t * t - x * x * z * z * z - 0.045 * y * y * z * z * z;

      if (F < 0) {
        // 映射到世界坐标：(x, z, y) → 让心形正立（尖端朝下）
        const wx = x * SCALE;
        const wy = z * SCALE;
        const wz = y * SCALE;
        positions[i * 3]     = wx;
        positions[i * 3 + 1] = wy;
        positions[i * 3 + 2] = wz;

        // 颜色：随机调色板 + 12% 概率提亮为暖白高光 + 底部偏深红
        const c = palette[(Math.random() * palette.length) | 0].clone();
        if (Math.random() < 0.12) c.lerp(hotWhite, 0.45 + Math.random() * 0.5);
        if (wy < -SCALE * 0.55) c.lerp(deepRed, 0.25);
        colors[i * 3]     = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;

        sizes[i]   = 1.4 + Math.random() * 2.4;   // 适当放大，让每个「潘 / 火」字清晰可辨
        phases[i]  = Math.random();
        charIdx[i] = i % 3;   // 在「潘」「火」「火」之间循环分配
        i++;
      }
    }

    const heartGeo = new THREE.BufferGeometry();
    heartGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    heartGeo.setAttribute('aColor',   new THREE.BufferAttribute(colors, 3));
    heartGeo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
    heartGeo.setAttribute('aPhase',   new THREE.BufferAttribute(phases, 1));
    heartGeo.setAttribute('aChar',    new THREE.BufferAttribute(charIdx, 1));
    heartGeo.center(); // 居中

    /* ---------- 生成「潘火火」字符纹理图集（横向 3 格） ---------- */
    // 把三个字画进一张 canvas，每个粒子按 aChar 采样对应那一格
    const CHAR_LIST = ['潘', '火', '火'];
    const CELL = 256;                 // 每个字格子的像素尺寸
    const atlas = document.createElement('canvas');
    atlas.width = CELL * CHAR_LIST.length;
    atlas.height = CELL;
    const actx = atlas.getContext('2d');
    actx.clearRect(0, 0, atlas.width, atlas.height);
    actx.font = `bold ${Math.floor(CELL * 0.78)}px "PingFang SC","Microsoft YaHei","STHeiti",sans-serif`;
    actx.textAlign = 'center';
    actx.textBaseline = 'middle';
    CHAR_LIST.forEach((ch, k) => {
      const cx = k * CELL + CELL / 2;
      const cy = CELL / 2 + CELL * 0.04;
      actx.fillStyle = '#ffffff';
      actx.fillText(ch, cx, cy);
    });
    const charTex = new THREE.CanvasTexture(atlas);
    charTex.minFilter = THREE.LinearFilter;
    charTex.magFilter = THREE.LinearFilter;

    /* ---------- 心形粒子着色器 ---------- */
    const heartMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:       { value: 0 },
        uBurst:      { value: 0 },
        uPixelRatio: { value: renderer.getPixelRatio() },
        uBeatOn:     { value: 1.0 },   // 跳动开关（1=跳动，0=静止）
        uTwinkleOn:  { value: 1.0 },   // 闪烁开关（1=闪烁，0=稳定）
        uCharTex:    { value: charTex },
        uCellU:      { value: 1.0 / CHAR_LIST.length }  // 每个字在图集 u 方向占的宽度
      },
      vertexShader: /* glsl */`
        uniform float uTime;
        uniform float uBurst;
        uniform float uPixelRatio;
        uniform float uBeatOn;
        uniform float uTwinkleOn;
        uniform float uCellU;
        attribute float aSize;
        attribute vec3  aColor;
        attribute float aPhase;
        attribute float aChar;
        varying vec3  vColor;
        varying float vGlow;
        varying float vCharOffset;

        // 近似心跳节律：周期内「咚-哒」两次脉冲
        float heartBeat(float t) {
          float period = 1.25;
          float f = mod(t, period) / period;
          float p = 0.0;
          p += exp(-pow((f - 0.02) * 17.0, 2.0));
          p += exp(-pow((f - 0.20) * 13.0, 2.0)) * 0.65;
          return p;
        }

        void main() {
          vColor = aColor;
          vCharOffset = aChar * uCellU;          // 该粒子对应字在图集中的 u 起点
          vec3 pos = position;

          // 跳动：用 uBeatOn 在「静止」与「心跳脉冲」之间插值
          float beat  = mix(0.0, heartBeat(uTime), uBeatOn);
          float pulse = 1.0 + beat * 0.07;
          pos *= pulse;

          // 点击爆开：沿径向短暂外推
          vec3 dir = normalize(position + vec3(1e-4));
          pos += dir * uBurst * (0.35 + 0.65 * aPhase);

          vec4 mv = modelViewMatrix * vec4(pos, 1.0);
          gl_Position = projectionMatrix * mv;

          // 闪烁：开启则正弦呼吸，关闭则稳定亮度
          float twinkle = 0.7 + 0.3 * sin(uTime * 3.0 + aPhase * 6.2831);
          vGlow = mix(0.85, twinkle, uTwinkleOn);

          float size = aSize * (300.0 / -mv.z) * uPixelRatio;
          gl_PointSize = size * (0.85 + beat * 0.55);
        }
      `,
      fragmentShader: /* glsl */`
        uniform sampler2D uCharTex;
        uniform float uCellU;
        varying vec3  vColor;
        varying float vGlow;
        varying float vCharOffset;
        void main() {
          // 圆形软边遮罩（保留点精灵的外形）
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          if (d > 0.5) discard;
          float alpha = smoothstep(0.5, 0.0, d);
          alpha = pow(alpha, 1.5);

          // 采样该粒子对应的字（内缩 3% 避免线性过滤混入相邻字）
          float inset = uCellU * 0.03;
          float cu = vCharOffset + inset + gl_PointCoord.x * (uCellU - 2.0 * inset);
          float cv = 1.0 - gl_PointCoord.y;   // CanvasTexture 默认 flipY，翻转 v 让「潘火火」正立
          float glyph = texture2D(uCharTex, vec2(cu, cv)).a;   // 字形 alpha
          alpha *= glyph;
          if (glyph < 0.02) discard;

          vec3 col = vColor * vGlow;
          col += vec3(0.55, 0.30, 0.40) * pow(1.0 - d * 2.0, 4.0) * glyph; // 字心高光
          gl_FragColor = vec4(col, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const heart = new THREE.Points(heartGeo, heartMat);
    heart.rotation.y = Math.PI;   // 正面朝向镜头（凹陷在两瓣之间）
    scene.add(heart);

    /* =========================================================
       3. 背景星空
       ========================================================= */
    const STAR_COUNT = isMobile ? 800 : 1800;
    const sPos = new Float32Array(STAR_COUNT * 3);
    const sSize = new Float32Array(STAR_COUNT);
    const sPhase = new Float32Array(STAR_COUNT);
    for (let k = 0; k < STAR_COUNT; k++) {
      // 球壳分布
      const r = 60 + Math.random() * 40;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      sPos[k * 3]     = r * Math.sin(phi) * Math.cos(theta);
      sPos[k * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      sPos[k * 3 + 2] = r * Math.cos(phi);
      sSize[k]  = Math.random() * 2.0 + 0.3;
      sPhase[k] = Math.random();
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
    starGeo.setAttribute('aSize',    new THREE.BufferAttribute(sSize, 1));
    starGeo.setAttribute('aPhase',   new THREE.BufferAttribute(sPhase, 1));

    const starMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uPixelRatio: { value: renderer.getPixelRatio() } },
      vertexShader: /* glsl */`
        uniform float uTime;
        uniform float uPixelRatio;
        attribute float aSize;
        attribute float aPhase;
        varying float vTw;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_Position = projectionMatrix * mv;
          vTw = 0.4 + 0.6 * (0.5 + 0.5 * sin(uTime * 1.5 + aPhase * 6.2831));
          gl_PointSize = aSize * uPixelRatio * (60.0 / -mv.z) * 8.0;
        }
      `,
      fragmentShader: /* glsl */`
        varying float vTw;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          if (d > 0.5) discard;
          float a = smoothstep(0.5, 0.0, d);
          gl_FragColor = vec4(vec3(1.0, 0.92, 0.95) * vTw, a * vTw);
        }
      `,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    /* =========================================================
       4. 交互：拖拽旋转 + 自动旋转 + 点击心跳
       ========================================================= */
    const target = { rx: 0.12, ry: 0 };
    const current = { rx: 0.12, ry: 0 };
    let dragging = false;
    let lastX = 0, lastY = 0;
    let autoSpeed = 0.0016;

    function onDown(x, y) { dragging = true; lastX = x; lastY = y; }
    function onMove(x, y) {
      if (!dragging) return;
      const dx = x - lastX, dy = y - lastY;
      target.ry += dx * 0.006;
      target.rx += dy * 0.006;
      target.rx = Math.max(-1.0, Math.min(1.0, target.rx));
      lastX = x; lastY = y;
    }
    function onUp() { dragging = false; }

    canvas.addEventListener('pointerdown', e => { onDown(e.clientX, e.clientY); });
    window.addEventListener('pointermove', e => { onMove(e.clientX, e.clientY); });
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);

    // 点击触发爆开心跳
    let burstTimer = 0;
    canvas.addEventListener('click', () => {
      heartMat.uniforms.uBurst.value = 1.0;
      burstTimer = 0;
    });

    // 开关：跳动 / 闪烁
    document.getElementById('beatToggle').addEventListener('change', e => {
      heartMat.uniforms.uBeatOn.value = e.target.checked ? 1.0 : 0.0;
    });
    document.getElementById('twinkleToggle').addEventListener('change', e => {
      heartMat.uniforms.uTwinkleOn.value = e.target.checked ? 1.0 : 0.0;
    });

    /* =========================================================
       5. 主循环
       ========================================================= */
    const clock = new THREE.Clock();
    function tick() {
      const t = clock.getElapsedTime();

      // 自动旋转（拖拽时减弱）
      if (!dragging) target.ry += autoSpeed;

      // 平滑插值
      current.rx += (target.rx - current.rx) * 0.08;
      current.ry += (target.ry - current.ry) * 0.08;
      heart.rotation.x = current.rx;
      heart.rotation.y = current.ry;

      // 心形微微跟随鼠标的视差倾斜（额外浪漫感）
      // 已由 current.rx/ry 体现，这里不再叠加

      // 点击爆开衰减
      heartMat.uniforms.uBurst.value *= 0.93;

      heartMat.uniforms.uTime.value = t;
      starMat.uniforms.uTime.value  = t;
      stars.rotation.y = t * 0.01;

      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();

    /* =========================================================
       6. 自适应
       ========================================================= */
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      fitHeartToView();   // 旋转屏幕/尺寸变化时重新让心形完整入镜
      heartMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      starMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
    });

    /* =========================================================
       7. 飘落爱心（DOM + CSS）
       ========================================================= */
    const petalChars = ['♥', '❤', '❥', '♡'];
    function spawnPetals(n) {
      for (let k = 0; k < n; k++) {
        const el = document.createElement('div');
        el.className = 'petal';
        el.textContent = petalChars[(Math.random() * petalChars.length) | 0];
        const size = 10 + Math.random() * 22;
        const dur  = 9 + Math.random() * 10;
        const delay = -Math.random() * dur; // 负延迟，立刻分布满屏
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.fontSize = size + 'px';
        el.style.opacity = String(0.4 + Math.random() * 0.5);
        el.style.setProperty('--s', (0.6 + Math.random() * 0.9).toString());
        el.style.setProperty('--drift', ((Math.random() * 2 - 1) * 120) + 'px');
        el.style.setProperty('--spin', (Math.random() * 720 - 360) + 'deg');
        el.style.animationDuration = dur + 's';
        el.style.animationDelay = delay + 's';
        document.body.appendChild(el);
      }
    }
    spawnPetals(isMobile ? 12 : 26);
  </script>
</body>
</html>
