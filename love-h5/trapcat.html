<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>围住神经猫 🐱</title>
<script>(function(){try{var t=localStorage.getItem('lh5-theme');if(!t||['sakura','mint','lavender','peach','babyblue','lemon','berry','cocoa'].indexOf(t)<0)t='sakura';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="./css/theme.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--text);
    background:linear-gradient(160deg,var(--bg-1),var(--bg-3)); user-select:none; touch-action:none; }
  .top { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; gap:10px;
    padding:calc(10px + var(--safe-top)) 14px 10px; background:color-mix(in srgb,var(--bg-1) 75%,transparent);
    backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
  .top button { width:38px; height:38px; border-radius:50%; border:none; background:var(--card);
    box-shadow:0 2px 10px var(--card-shadow); display:grid; place-items:center; font-size:20px; cursor:pointer; }
  .top .tt { font-weight:800; font-size:17px; }
  .stat { margin-left:auto; font-size:13px; color:var(--text-soft); font-weight:700; }
  .stat b { color:var(--primary); font-size:16px; }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .hint { position:fixed; left:0; right:0; bottom:calc(16px + var(--safe-bottom)); text-align:center;
    color:var(--text-soft); font-size:12px; z-index:5; }
  .overlay { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.35); backdrop-filter:blur(3px); }
  .card-modal { background:var(--card); border-radius:var(--radius); box-shadow:0 12px 40px var(--card-shadow);
    padding:26px 22px; width:78%; max-width:300px; text-align:center; }
  .card-modal h2 { font-size:21px; margin-bottom:6px; }
  .card-modal p { color:var(--text-soft); font-size:13.5px; margin-bottom:16px; }
  .btn { width:100%; padding:12px; border:none; border-radius:var(--radius-pill); font-weight:700; font-size:15px;
    background:linear-gradient(135deg,var(--primary),var(--primary-deep)); color:#fff; box-shadow:0 6px 18px var(--card-shadow); cursor:pointer; }
</style>
</head>
<body>
<div class="top">
  <button id="back" aria-label="返回"><i class="ri-arrow-left-s-line"></i></button>
  <div class="tt">围住神经猫</div>
  <div class="stat">用了 <b id="walls">0</b> 块</div>
</div>
<canvas id="c"></canvas>
<div class="hint">点格子放墙，把猫围住（猫跑出边界=输）</div>
<div class="overlay" id="win" style="display:none"><div class="card-modal">
  <h2>🎉 困住啦！</h2><p>用了 <b id="wWalls">0</b> 块墙</p><button class="btn" id="wAgain">再来一局</button>
  <button class="btn" style="background:var(--card);color:var(--text-soft);box-shadow:0 2px 10px var(--card-shadow);margin-top:8px" onclick="document.getElementById('back').click()">退出游戏</button>
</div></div>
<div class="overlay" id="lose" style="display:none"><div class="card-modal">
  <h2>😿 猫跑了</h2><p>下次堵得更快点～</p><button class="btn" id="lAgain">再来一局</button>
  <button class="btn" style="background:var(--card);color:var(--text-soft);box-shadow:0 2px 10px var(--card-shadow);margin-top:8px" onclick="document.getElementById('back').click()">退出游戏</button>
</div></div>
<script>
document.getElementById("back").onclick = function(){
  if (window.parent && window.parent !== window) window.parent.postMessage({type:"cf-go-home"},"*");
  else location.replace("./index.html");
};
(function(){
  var N = 9;                       // 9x9 轴向六边形棋盘
  var cv = document.getElementById("c"), ctx = cv.getContext("2d");
  var W, H, size, ox, oy, cells, cat, wallCount, gameOver, centers=[];
  var SQ3 = Math.sqrt(3);
  function color(v,f){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||f; }
  function snap(){ return { card:color("--card","#fff"), chip:color("--chip","#eee"), border:color("--border","#eee"),
    primary:color("--primary","#ff7aa2"), primaryDeep:color("--primary-deep","#e85a86"),
    accent:color("--accent","#ff9eb5"), text:color("--text","#333"), bg1:color("--bg-1","#fff5f7") }; }
  var th = snap();
  function resize(){ var dpr=Math.min(devicePixelRatio||1,2); W=cv.clientWidth; H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    // 适应：宽= size*SQ3*(1.5N-0.5)；高=size*(1.5N+0.5)
    var sW = (W-24)/(SQ3*(1.5*N-0.5)), sH=(H-100)/((1.5*N+0.5));
    size = Math.min(sW, sH); var gridW = size*SQ3*(1.5*N-0.5), gridH = size*(1.5*N+0.5);
    ox = (W-gridW)/2; oy = (H-gridH)/2 + 10; }
  function center(q,r){ return { x: ox + size*SQ3*(q + r/2) + size*SQ3/2, y: oy + size*(1.5*r + 1) }; }
  resize(); addEventListener("resize", function(){ resize(); draw(); });

  var DIRS = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
  function nbrs(q,r){ var out=[]; for(var d of DIRS){ var a=q+d[0],b=r+d[1]; if(a>=0&&a<N&&b>=0&&b<N) out.push([a,b]); } return out; }
  function isEdge(q,r){ return q===0||q===N-1||r===0||r===N-1; }

  function reset(){
    cells = []; for(var q=0;q<N;q++){ cells[q]=[]; for(var r=0;r<N;r++) cells[q][r]={wall:false}; }
    cat = { q:(N/2)|0, r:(N/2)|0 };
    wallCount = 0; gameOver = false;
    // 初始随机墙（不在猫位）
    var init = 11, tries=0;
    while(init>0 && tries<500){ tries++; var q=(Math.random()*N)|0, r=(Math.random()*N)|0;
      if((q===cat.q&&r===cat.r)||cells[q][r].wall) continue; cells[q][r].wall=true; init--; }
    document.getElementById("walls").textContent = "0";
    document.getElementById("win").style.display="none"; document.getElementById("lose").style.display="none";
  }

  // 猫 BFS 找最近边界，返回第一步；null=被困
  function planCat(){
    if(isEdge(cat.q,cat.r)) return {escape:true};
    var seen={}; var key=(q,r)=>q+","+r; seen[key(cat.q,cat.r)]=null;
    var queue=[{q:cat.q,r:cat.r}];
    while(queue.length){
      var c=queue.shift();
      for(var nb of nbrs(c.q,c.r)){ var k=key(nb[0],nb[1]); if(seen.hasOwnProperty(k)||cells[nb[0]][nb[1]].wall) continue;
        seen[k]=c;
        if(isEdge(nb[0],nb[1])){ var cur={q:nb[0],r:nb[1]};
          while(seen[key(cur.q,cur.r)] && !(seen[key(cur.q,cur.r)].q===cat.q && seen[key(cur.q,cur.r)].r===cat.r)) cur=seen[key(cur.q,cur.r)];
          return {step:cur}; }
        queue.push({q:nb[0],r:nb[1]}); } }
    return {trapped:true};
  }

  function onCell(q,r){
    if(gameOver) return;
    if(q===cat.q && r===cat.r) return;
    if(cells[q][r].wall) return;
    cells[q][r].wall = true; wallCount++; document.getElementById("walls").textContent=wallCount;
    var p = planCat();
    if(p.trapped){ gameOver=true; draw(); document.getElementById("wWalls").textContent=wallCount; document.getElementById("win").style.display="flex"; return; }
    if(p.escape){ gameOver=true; draw(); document.getElementById("lose").style.display="flex"; return; }
    cat = p.step;
    if(isEdge(cat.q,cat.r)){ gameOver=true; draw(); document.getElementById("lose").style.display="flex"; return; }
    draw();
  }

  function hexPath(cx,cy,s){ ctx.beginPath();
    for(var i=0;i<6;i++){ var a=Math.PI/180*(60*i-30); var x=cx+s*Math.cos(a), y=cy+s*Math.sin(a); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    ctx.closePath(); }
  function draw(){ ctx.clearRect(0,0,W,H); centers=[];
    for(var q=0;q<N;q++) for(var r=0;r<N;r++){ var c=center(q,r); centers.push({q,r,x:c.x,y:c.y});
      hexPath(c.x,c.y,size*0.95);
      var cell=cells[q][r], isCat=(q===cat.q&&r===cat.r);
      ctx.fillStyle = cell.wall ? th.primary : th.card; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle=th.border; ctx.stroke();
      if(cell.wall){ ctx.fillStyle="rgba(255,255,255,0.85)"; ctx.font=(size*0.9)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("🌸",c.x,c.y); }
      if(isCat){ ctx.fillStyle=th.primaryDeep; ctx.font=(size*1.1)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("🐱",c.x,c.y); }
    }
  }

  function pickCell(px,py){ var best=null,bd=1e9; for(var c of centers){ var d=(c.x-px)**2+(c.y-py)**2; if(d<bd){bd=d;best=c;} }
    return bd < (size*1.1)**2 ? best : null; }
  function handle(x,y){ var c=pickCell(x,y); if(c) onCell(c.q,c.r); }
  cv.addEventListener("click",function(e){ var r=cv.getBoundingClientRect(); handle(e.clientX-r.left,e.clientY-r.top); });
  cv.addEventListener("touchstart",function(e){ var t=e.touches[0],r=cv.getBoundingClientRect(); handle(t.clientX-r.left,t.clientY-r.top); e.preventDefault(); },{passive:false});

  document.getElementById("wAgain").onclick=start; document.getElementById("lAgain").onclick=start;
  function start(){ th=snap(); reset(); draw(); }
  start();
})();
</script>
</body>
</html>
