<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>贪吃蛇 🐍</title>
<script>(function(){try{var t=localStorage.getItem('lh5-theme');if(!t||['sakura','mint','lavender','peach','babyblue','lemon','berry','cocoa'].indexOf(t)<0)t='sakura';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="./css/theme.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--text);
    background:linear-gradient(160deg,var(--bg-1),var(--bg-3)); user-select:none; touch-action:none; }
  .top { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; gap:10px;
    padding:calc(10px + var(--safe-top)) 14px 10px; background:color-mix(in srgb,var(--bg-1) 75%,transparent);
    backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
  .top button { width:38px; height:38px; border-radius:50%; border:none; background:var(--card);
    box-shadow:0 2px 10px var(--card-shadow); display:grid; place-items:center; font-size:20px; cursor:pointer; }
  .top .tt { font-weight:800; font-size:17px; }
  .score { margin-left:auto; font-weight:800; color:var(--primary); font-size:18px; }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .overlay { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.35); backdrop-filter:blur(3px); }
  .card { background:var(--card); border-radius:var(--radius); box-shadow:0 12px 40px var(--card-shadow);
    padding:24px 22px; width:78%; max-width:300px; text-align:center; }
  .card h2 { font-size:20px; margin-bottom:8px; }
  .card p { color:var(--text-soft); font-size:14px; margin-bottom:16px; }
  .card .big { font-size:30px; font-weight:800; color:var(--primary); margin:6px 0 14px; }
  .btn { width:100%; padding:12px; border:none; border-radius:var(--radius-pill); font-weight:700; font-size:15px;
    background:linear-gradient(135deg,var(--primary),var(--primary-deep)); color:#fff; box-shadow:0 6px 18px var(--card-shadow); cursor:pointer; }
  .hint { position:fixed; left:0; right:0; bottom:calc(18px + var(--safe-bottom)); text-align:center;
    color:var(--text-soft); font-size:12px; z-index:5; }
</style>
</head>
<body>
<div class="top">
  <button id="back" aria-label="返回"><i class="ri-arrow-left-s-line"></i></button>
  <div class="tt">贪吃蛇</div>
  <div class="score" id="score">0</div>
</div>
<canvas id="c"></canvas>
<div class="hint">滑动屏幕 / 方向键 控制方向</div>
<div class="overlay" id="start"><div class="card">
  <h2>🐍 贪吃蛇</h2><p>吃到 ❤️ 变长，撞墙或自己就结束</p>
  <button class="btn" id="go">开始</button>
</div></div>
<div class="overlay" id="over" style="display:none"><div class="card">
  <h2>游戏结束</h2><div class="big" id="final">0</div>
  <button class="btn" id="again">再来一局</button>
  <button class="btn" style="background:var(--card);color:var(--text-soft);box-shadow:0 2px 10px var(--card-shadow);margin-top:8px" onclick="document.getElementById('back').click()">退出游戏</button>
</div></div>
<script>
document.getElementById("back").onclick = function(){
  if (window.parent && window.parent !== window) window.parent.postMessage({type:"cf-go-home"},"*");
  else location.replace("./index.html");
};
(function(){
  var cv = document.getElementById("c"), ctx = cv.getContext("2d");
  var W, H, CELL, COLS, ROWS;
  function resize(){ var dpr=Math.min(devicePixelRatio||1,2); W=cv.clientWidth; H=cv.clientHeight;
    cv.width=W*dpr; cv.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    CELL=Math.max(14, Math.floor(W/22)); COLS=Math.floor(W/CELL); ROWS=Math.floor(H/CELL); }
  resize(); addEventListener("resize",resize);
  function color(v,f){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||f; }
  function snap(){ return { p:color("--primary","#ff7aa2"), pd:color("--primary-deep","#e85a86"),
    bg:color("--bg-1","#fff5f7"), bd:color("--border","#eee"), tx:color("--text","#333"),
    head:color("--primary-deep","#e85a86"), body:color("--primary-soft","#ffb6c8") }; }
  var th = snap();
  var snake, dir, nextDir, food, score, alive, raf, last=0, stepMs=130;
  function reset(){ var cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
    snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}]; dir={x:1,y:0}; nextDir=dir; score=0; alive=true;
    document.getElementById("score").textContent="0"; placeFood(); }
  function placeFood(){ do{ food={x:(Math.random()*COLS)|0, y:(Math.random()*ROWS)|0}; }
    while(snake.some(s=>s.x===food.x&&s.y===food.y)); }
  function step(){ dir=nextDir; var h={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if(h.x<0||h.y<0||h.x>=COLS||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){ alive=false; over(); return; }
    snake.unshift(h);
    if(h.x===food.x&&h.y===food.y){ score++; document.getElementById("score").textContent=score; placeFood(); if(stepMs>70) stepMs-=2; }
    else snake.pop();
  }
  function draw(){ ctx.clearRect(0,0,W,H);
    // 网格底
    ctx.fillStyle=th.bg; ctx.globalAlpha=0.5; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
    // 食物
    var fr=CELL*0.32;
    ctx.font=fr*2+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("❤️", food.x*CELL+CELL/2, food.y*CELL+CELL/2);
    // 蛇
    snake.forEach(function(s,i){ var r=CELL*0.32;
      ctx.beginPath(); ctx.arc(s.x*CELL+CELL/2, s.y*CELL+CELL/2, r, 0, Math.PI*2);
      ctx.fillStyle = i===0 ? th.head : th.body; ctx.fill();
      if(i===0){ ctx.lineWidth=2; ctx.strokeStyle="#fff"; ctx.stroke();
        ctx.font=(CELL*0.5)+"px serif"; ctx.fillText("🐱", s.x*CELL+CELL/2, s.y*CELL+CELL/2); }
    });
  }
  function loop(ts){ if(!last)last=ts; if(ts-last>=stepMs && alive){ step(); last=ts; } draw();
    raf=requestAnimationFrame(loop); }
  function over(){ cancelAnimationFrame(raf); document.getElementById("final").textContent=score;
    document.getElementById("over").style.display="flex"; stepMs=130; }
  function start(){ document.getElementById("start").style.display="none";
    document.getElementById("over").style.display="none"; th=snap(); reset(); last=0; raf=requestAnimationFrame(loop); }
  document.getElementById("go").onclick=start; document.getElementById("again").onclick=start;
  // 控制
  function setDir(x,y){ if(dir && dir.x===-x && dir.y===-y) return; nextDir={x:x,y:y}; } // 不能直接反向
  addEventListener("keydown",function(e){ var k=e.key;
    if(k==="ArrowUp"||k==="w")setDir(0,-1); else if(k==="ArrowDown"||k==="s")setDir(0,1);
    else if(k==="ArrowLeft"||k==="a")setDir(-1,0); else if(k==="ArrowRight"||k==="d")setDir(1,0); });
  var sx,sy;
  cv.addEventListener("touchstart",function(e){ var t=e.touches[0]; sx=t.clientX; sy=t.clientY; },{passive:true});
  cv.addEventListener("touchend",function(e){ var t=e.changedTouches[0]; var dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
    if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1); },{passive:true});
})();
</script>
</body>
</html>
