<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>飞行器 🚀</title>
<script>(function(){try{var t=localStorage.getItem('lh5-theme');if(!t||['sakura','mint','lavender','peach','babyblue','lemon','berry','cocoa'].indexOf(t)<0)t='sakura';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="./css/theme.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--text);
    background:linear-gradient(160deg,var(--bg-1),var(--bg-3)); user-select:none; touch-action:none; }
  .top { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; gap:10px;
    padding:calc(10px + var(--safe-top)) 14px 10px; background:color-mix(in srgb,var(--bg-1) 75%,transparent);
    backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
  .top button { width:38px; height:38px; border-radius:50%; border:none; background:var(--card);
    box-shadow:0 2px 10px var(--card-shadow); display:grid; place-items:center; font-size:20px; cursor:pointer; }
  .top .tt { font-weight:800; font-size:17px; }
  .stat { margin-left:auto; display:flex; gap:14px; font-size:13px; color:var(--text-soft); font-weight:700; }
  .stat b { color:var(--primary); font-size:16px; }
  .lives { color:var(--primary); font-size:16px; }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .hint { position:fixed; left:0; right:0; bottom:calc(14px + var(--safe-bottom)); text-align:center;
    color:var(--text-soft); font-size:12px; z-index:5; }
  .overlay { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.35); backdrop-filter:blur(3px); }
  .card-modal { background:var(--card); border-radius:var(--radius); box-shadow:0 12px 40px var(--card-shadow);
    padding:26px 22px; width:78%; max-width:300px; text-align:center; }
  .card-modal h2 { font-size:20px; margin-bottom:8px; }
  .card-modal p { color:var(--text-soft); font-size:13.5px; margin-bottom:14px; }
  .big { font-size:30px; font-weight:800; color:var(--primary); margin:4px 0 16px; }
  .btn { width:100%; padding:12px; border:none; border-radius:var(--radius-pill); font-weight:700; font-size:15px;
    background:linear-gradient(135deg,var(--primary),var(--primary-deep)); color:#fff; box-shadow:0 6px 18px var(--card-shadow); cursor:pointer; }
</style>
</head>
<body>
<div class="top">
  <button id="back" aria-label="返回"><i class="ri-arrow-left-s-line"></i></button>
  <div class="tt">飞行器</div>
  <div class="stat"><span>分 <b id="score">0</b></span><span class="lives" id="lives">💖💖💖</span></div>
</div>
<canvas id="c"></canvas>
<div class="hint">拖动屏幕移动飞船（自动开火）</div>
<div class="overlay" id="start"><div class="card-modal">
  <h2>🚀 飞行器</h2><p>拖动飞船躲避并击落来袭 💢，3 条命</p>
  <button class="btn" id="go">开始</button>
</div></div>
<div class="overlay" id="over" style="display:none"><div class="card-modal">
  <h2>💥 坠毁</h2><div class="big" id="final">0</div>
  <button class="btn" id="again">再来</button>
  <button class="btn" style="background:var(--card);color:var(--text-soft);box-shadow:0 2px 10px var(--card-shadow);margin-top:8px" onclick="document.getElementById('back').click()">退出游戏</button>
</div></div>
<script>
document.getElementById("back").onclick = function(){
  if (window.parent && window.parent !== window) window.parent.postMessage({type:"cf-go-home"},"*");
  else location.replace("./index.html");
};
(function(){
  var cv=document.getElementById("c"), ctx=cv.getContext("2d");
  var W,H; function resize(){ var dpr=Math.min(devicePixelRatio||1,2); W=cv.clientWidth;H=cv.clientHeight;
    cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0); }
  resize(); addEventListener("resize",resize);
  function color(v,f){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim()||f; }
  function snap(){ return { primary:color("--primary","#ff7aa2"), primaryDeep:color("--primary-deep","#e85a86"),
    accent:color("--accent","#ff9eb5"), text:color("--text","#333") }; }
  var th=snap();
  var ship, bullets, enemies, parts, score, lives, alive, raf, lastTs=0, lastShot=0, lastEnemy=0, enemyInt=900;
  function reset(){ ship={x:W/2,y:H-90,r:18}; bullets=[]; enemies=[]; parts=[]; score=0; lives=3; alive=true; enemyInt=900;
    document.getElementById("score").textContent=0; document.getElementById("lives").textContent="💖💖💖"; }
  function livesStr(n){ var s=""; for(var i=0;i<n;i++) s+="💖"; return s||"💀"; }
  function frame(ts){
    if(!lastTs)lastTs=ts; var dt=Math.min(0.05,(ts-lastTs)/1000); lastTs=ts;
    if(alive){
      // 自动开火
      if(ts-lastShot>260){ lastShot=ts; bullets.push({x:ship.x,y:ship.y-ship.r,r:5}); }
      if(ts-lastEnemy>enemyInt){ lastEnemy=ts; spawnEnemy(); if(enemyInt>450) enemyInt-=8; }
      bullets.forEach(b=>b.y -= 420*dt);
      enemies.forEach(e=>{ e.y += e.sp*dt; e.x += e.vx*dt; if(e.x<20||e.x>W-20) e.vx*=-1; });
      // 子弹击中敌机
      for(var i=enemies.length-1;i>=0;i--){ var e=enemies[i];
        for(var j=bullets.length-1;j>=0;j--){ var b=bullets[j];
          if(Math.hypot(e.x-b.x,e.y-b.y)<e.r+b.r){ explode(e.x,e.y); enemies.splice(i,1); bullets.splice(j,1); score++; document.getElementById("score").textContent=score; break; } }
      }
      // 敌机撞船或出底
      for(var i=enemies.length-1;i>=0;i--){ var e=enemies[i];
        if(Math.hypot(e.x-ship.x,e.y-ship.y)<e.r+ship.r){ explode(e.x,e.y); explode(ship.x,ship.y); enemies.splice(i,1); hurt(); }
        else if(e.y>H+30){ enemies.splice(i,1); }
      }
      bullets = bullets.filter(b=>b.y>-20);
      parts.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; }); parts=parts.filter(p=>p.life>0);
    }
    draw();
    raf=requestAnimationFrame(frame);
  }
  function spawnEnemy(){ enemies.push({ x:30+Math.random()*(W-60), y:-30, r:16, sp:80+Math.random()*60, vx:(Math.random()-0.5)*60 }); }
  function explode(x,y){ for(var i=0;i<10;i++){ var a=Math.random()*Math.PI*2,s=60+Math.random()*120;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5,r:3+Math.random()*3,c: Math.random()<0.5?th.primary:th.accent}); } }
  function hurt(){ lives--; document.getElementById("lives").textContent=livesStr(lives); if(lives<=0) over(); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    // 粒子
    parts.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life*2); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1;
    // 子弹
    ctx.fillStyle=th.primaryDeep; bullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); });
    // 敌机
    enemies.forEach(e=>{ ctx.font=(e.r*1.8)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("💢",e.x,e.y); });
    // 飞船
    ctx.font=(ship.r*2.2)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("🚀",ship.x,ship.y);
  }
  function over(){ alive=false; document.getElementById("final").textContent=score; document.getElementById("over").style.display="flex"; }
  function start(){ document.getElementById("start").style.display="none"; document.getElementById("over").style.display="none"; th=snap(); resize(); reset(); lastTs=0; raf=requestAnimationFrame(frame); }
  document.getElementById("go").onclick=start; document.getElementById("again").onclick=start;
  // 控制：拖动飞船 x
  function move(x){ var r=cv.getBoundingClientRect(); ship && (ship.x = Math.max(24, Math.min(W-24, x-r.left))); }
  cv.addEventListener("pointermove",function(e){ if(e.pressure>0||e.buttons||e.pointerType==="touch") move(e.clientX); });
  cv.addEventListener("pointerdown",function(e){ move(e.clientX); });
  // 初始静态
  ship={x:W/2,y:H-90,r:18}; bullets=[];enemies=[];parts=[]; raf=requestAnimationFrame(frame); alive=false;
})();
</script>
</body>
</html>
