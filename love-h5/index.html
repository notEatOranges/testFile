<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#ffd1dc" />
<title>我们的小窝 ♥</title>
<!-- 防 FOUC：CSS 加载前先应用主题 -->
<script>(function(){var t=localStorage.getItem('lh5-theme');if(!t||['sakura','mint','lavender'].indexOf(t)<0)t='sakura';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="./css/theme.css" />
<link rel="stylesheet" href="./css/base.css" />
<link rel="stylesheet" href="./css/pages.css" />
</head>
<body>

<!-- 引导：房间号 + 身份 -->
<div id="onboarding" class="onboarding">
  <div class="logo">💑</div>
  <h1>我们的小窝</h1>
  <div class="sub">只属于你俩的小空间</div>

  <label class="bold small">输入你们约定的房间号（两人用同一个）</label>
  <input id="roomInput" class="input mt8" placeholder="如 love2026 或一串密码" autocomplete="off" />

  <div class="bold small mt16">我是…</div>
  <div class="role-pick">
    <div class="role-card" data-role="boy"><img src="./assets/images/boy.jpg" alt="" /><div class="rl">男生</div></div>
    <div class="role-card" data-role="girl"><img src="./assets/images/girl.jpg" alt="" /><div class="rl">女生</div></div>
  </div>

  <button id="enterBtn" class="btn btn-primary btn-block mt16">进入 ♥</button>

  <div id="roomHistory" class="room-history" style="display:none"></div>

  <div class="small muted" style="text-align:center;margin-top:14px;line-height:1.6">
    未配置后端＝本地预览模式（同手机多标签页可模拟双人）。<br/>
    异地实时需配置 Supabase / MemFire，见 <b>SETUP.md</b>。
  </div>
</div>

<!-- 主应用 -->
<div id="app" class="app" style="display:none">
  <div class="topbar">
    <button id="backBtn" class="icon-btn" style="display:none">‹</button>
    <div class="title" id="topTitle">我们的小窝</div>
    <button id="exitBtn" class="icon-btn" title="退出房间" style="display:none">⏻</button>
  </div>

  <section id="view-home" class="view active"></section>
  <section id="view-chat" class="view"></section>
  <section id="view-mood" class="view"></section>
  <section id="view-days" class="view"></section>
  <section id="view-wishlist" class="view"></section>
  <section id="view-truthbox" class="view"></section>

  <div id="iframeHost"></div>
</div>

<!-- 主题切换器（引导页和主应用都可用） -->
<button id="themeFab" class="theme-fab">🎨</button>
<div id="themePop" class="theme-pop">
  <div class="theme-opt" data-theme="sakura"><span class="swatch" style="background:linear-gradient(135deg,#ff7aa2,#ffd1dc)"></span>樱花粉</div>
  <div class="theme-opt" data-theme="mint"><span class="swatch" style="background:linear-gradient(135deg,#5bb89e,#b8e6cc)"></span>薄荷绿</div>
  <div class="theme-opt" data-theme="lavender"><span class="swatch" style="background:linear-gradient(135deg,#9b7fd4,#d2c2ec)"></span>薰衣草紫</div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
