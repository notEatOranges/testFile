<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试数据生成器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
    .container { max-width: 100%; margin: 0 auto; padding: 16px 24px; height: 100vh; display: flex; flex-direction: column; }
    h1 { text-align: center; margin-bottom: 12px; font-size: 22px; color: #1a1a1a; flex-shrink: 0; }
    .main-layout { display: flex; gap: 16px; flex: 1; min-height: 0; }
    .left-panel { width: 320px; flex-shrink: 0; overflow-y: auto; }
    .right-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .right-panel .card { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .right-panel .card-title { flex-shrink: 0; }
    .card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card-title { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 6px; }

    .batch-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .batch-row label { font-size: 14px; color: #555; }
    .batch-row select, .batch-row input { padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .checkbox-group label { display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer; user-select: none; }
    .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; accent-color: #4f46e5; }

    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: .15s; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-outline { background: #fff; color: #4f46e5; border: 1px solid #4f46e5; }
    .btn-outline:hover { background: #eef2ff; }
    .btns { display: flex; gap: 10px; flex-wrap: wrap; }

    .settings-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
    .setting-item { display: flex; flex-direction: column; gap: 4px; }
    .setting-item > label { font-size: 13px; color: #888; }
    .setting-item input, .setting-item select { padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; min-width: 120px; }
    .setting-item input:focus, .setting-item select:focus { border-color: #4f46e5; outline: none; }
    .or-sep { color: #aaa; font-size: 13px; align-self: flex-end; padding-bottom: 6px; }
    .settings-tip { font-size: 12px; color: #aaa; margin-top: 4px; }

    .result-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    .result-table th, .result-table td { border: 1px solid #e5e7eb; padding: 8px 10px; text-align: left; white-space: nowrap; }
    .result-table th { background: #f9fafb; color: #555; font-weight: 600; position: sticky; top: 0; }
    .result-table tr:hover td { background: #f5f3ff; }
    .table-wrap { overflow: auto; flex: 1; min-height: 0; }
    #resultArea { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .copy-cell { cursor: pointer; }
    .copy-cell:hover { color: #4f46e5; }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }

    .empty { text-align: center; color: #aaa; padding: 32px 0; font-size: 14px; }
  </style>
</head>

<div class="container">
  <h1>测试数据生成器</h1>

        <div class="btns">

          <button class="btn btn-outline" onclick="clearAll()">清空</button>

        </div>
        <div class="settings-row">
          <div class="setting-item">
            <label>省份</label>
            <select id="selProvince" onchange="onProvinceChange()"><option value="">随机</option></select>
          </div>
          <div class="setting-item">
            <label>城市</label>
            <select id="selCity" onchange="onCityChange()"><option value="">随机</option></select>
          </div>
          <div class="setting-item">
            <label>区县</label>
            <select id="selDistrict"><option value="">随机</option></select>

        </div>
        <div class="settings-tip">设置地址后，身份证地区码与详细地址一致</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="card">

      </div>
    </div>
  </div>
</div>

// 读取自定义设置，返回 { birthday:'YYYY-MM-DD'|null, areaCode:'123456'|null, areaInfo:{p,c,d,code}|null }
function getCustomSettings() {
  const s = { gender: null, birthday: null, areaInfo: null };

  // 性别
  const gInput = document.getElementById('customGender').value;
  if (gInput) s.gender = gInput;

  // 生日
  const bInput = document.getElementById('customBirthday').value;
  const aInput = document.getElementById('customAge').value;
  if (bInput) {
    s.birthday = bInput;
  } else if (aInput && parseInt(aInput) > 0) {
    const age = parseInt(aInput);
    const now = new Date();
    const year = now.getFullYear() - age;
    const m = pad2(randInt(1, 12));
    const d = pad2(randInt(1, 28));
    s.birthday = `${year}-${m}-${d}`;
  }

  // 地址
  const pi = document.getElementById('selProvince').value;
  if (pi !== '') {
    const ci = document.getElementById('selCity').value;
    if (ci !== '') {
      const di = document.getElementById('selDistrict').value;
      if (di !== '') {
        // 完整：省 + 市 + 区
        const prov = ADDR_DATA[pi];
        const city = prov.cities[ci];
        const dist = city.ds[di];
        s.areaInfo = { p: prov.p, c: city.c, d: dist.n, code: dist.code };
      } else {
        // 省 + 市，随机区
        const prov = ADDR_DATA[pi];
        const city = prov.cities[ci];
        const dist = pick(city.ds);
        s.areaInfo = { p: prov.p, c: city.c, d: dist.n, code: dist.code };
      }
    } else {
      // 只选了省，随机市+区
      const prov = ADDR_DATA[pi];
      const city = pick(prov.cities);
      const dist = pick(city.ds);
      s.areaInfo = { p: prov.p, c: city.c, d: dist.n, code: dist.code };
    }
  }

  return s;
}

function genName(gender) {

function genLandline(areaInfo) {
  let areaCode;
  if (areaInfo) {
    const provMap = TEL_AREA_CODES[areaInfo.p];
    if (provMap) areaCode = provMap[areaInfo.c] || pick(Object.values(provMap));
  }
  if (!areaCode) {
    const prov = pick(Object.keys(TEL_AREA_CODES));
    areaCode = pick(Object.values(TEL_AREA_CODES[prov]));
  }
  const localLen = areaCode.length <= 3 ? 8 : 7;
  let local = '';
  for (let i = 0; i < localLen; i++) local += randInt(0, 9);
  return areaCode + '-' + local;
}

function genPostcode(areaInfo) {
  let baseZip;
  if (areaInfo) baseZip = POSTAL_MAP[areaInfo.c];
  if (!baseZip) baseZip = pick(Object.values(POSTAL_MAP));
  return baseZip.slice(0, 4) + String(randInt(0, 99)).padStart(2, '0');
}

function genIdCard(gender, birthday, areaCode) {
  const area = areaCode || pick([
    '110101','110102','110105','110106','310101','310104','310115','320102',
    '320104','320106','440103','440104','440305','440306','330102','330106',
    '510104','510105','420102','420106','500103','500105','120101','120104'
  ]);
  const bd = birthday || `${randInt(1960, 2005)}-${pad2(randInt(1,12))}-${pad2(randInt(1,28))}`;
  const [y, m, d] = bd.split('-');
  const seq = String(randInt(0, 99)).padStart(2, '0') + (gender === '男' ? String(randInt(0, 4) * 2 + 1) : String(randInt(0, 4) * 2));
  const base = area + y + m + d + seq;
  const weights = [7,9,10,5,8,4,2,1,6,3,7,9,10,5,8,4,2];
  const checkChars = '10X98765432';
  let sum = 0;
  for (let i = 0; i < 17; i++) sum += parseInt(base[i]) * weights[i];
  return base + checkChars[sum % 11];
}

function genBankCard() {
  const bank = pick(Object.keys(BANK_PREFIXES));
  const prefix = BANK_PREFIXES[bank];
  const len = pick([16, 19]);
  let digits = prefix;
  while (digits.length < len - 1) digits += randInt(0, 9);
  let sum = 0;
  for (let i = 0; i < digits.length; i++) {
    let d = parseInt(digits[digits.length - 1 - i]);
    if (i % 2 === 0) { d *= 2; if (d > 9) d -= 9; }
    sum += d;
  }
  digits += (10 - (sum % 10)) % 10;
  return { name: bank, card: digits };
}

function genCreditCode() {
  const chars = '0123456789ABCDEFGHJKLMNPQRTUWXY';
  const dept = pick(['1','5','9']);
  const cat = chars[randInt(0, chars.length - 1)];
  const adminArea = String(randInt(110000, 659999));
  let body = '';
  for (let i = 0; i < 9; i++) body += chars[randInt(0, chars.length - 1)];
  const base = dept + cat + adminArea + body;
  const weights = [1,3,9,27,19,26,16,17,20,29,25,13,8,24,10,30,28];
  let sum = 0;
  for (let i = 0; i < 17; i++) sum += chars.indexOf(base[i]) * weights[i];
  const check = 31 - (sum % 31);
  return base + chars[check % 31];
}

  const prefix = name
    ? name.toLowerCase().replace(/[^\w]/g, '').slice(0, 8) + randInt(10, 999)
    : pick(pinyin_surnames) + pick(['wei','fang','na','min','jing','li','yan','jun','xiu','ying','hui','qiao','mei','ting','xue','ying','lin','lei','wei','qin','zhen','li','lan','feng','ju','shu','xin','yue','yao','tong','xuan','yan','jia','meng','xin','yi','han','yu','ping','xia','yan','ling','lu','xuan','fei','qian','yuan','ni','ying','ke','qi','wen','jing','lan','rui','wan','rong','ya','fen','he','mei','lu','shuang','hong','die','shi','yun','rou','rong','huan','xin','miao','man','yi','jie','qing','ning','bi','xiao','zhao','hao','chen','xu','jian','cong','jun','wei','liang','zheng','da','yuan','hang','kai','zhe','yi','ming','hao','xuan','xin','bin','rui','yang','lin','heng','cheng','ming','hui','rui','yi','yuan','cheng','yuan','qi','nan','kai','hao','sen','song','bai','tong','hong','de','qi','xiang','guang','qing','zheng','xin','cheng','an','chen','shu','cheng','run','han','hong','yi','jin','rong','jia','li','ji','wei','yao','chang','ping']) + randInt(10, 999);
  return prefix + '@' + pick(EMAIL_DOMAINS);
}

// ─── 生成一条记录 ───
function genOne(settings) {
  const gender = settings.gender || genGender();
  const birthday = genBirthday(settings.birthday);
  // 地址统一：随机或自定义都用同一个 areaInfo
  let areaInfo;
  if (settings.areaInfo) {
    areaInfo = settings.areaInfo;
  } else {
    const prov = pick(ADDR_DATA);
    const city = pick(prov.cities);
    const dist = pick(city.ds);
    areaInfo = { p: prov.p, c: city.c, d: dist.n, code: dist.code };
  }
  const bankInfo = genBankCard();
  return {
    name: genName(gender),
    gender,
    birthday,
    ethnicity: genEthnicity(),
    phone: genPhone(),
    landline: genLandline(areaInfo),
    postcode: genPostcode(areaInfo),
    idCard: genIdCard(gender, birthday, areaInfo.code),
    bankName: bankInfo.name,
    bankCard: bankInfo.card,
    creditCode: genCreditCode(),
    company: genCompany(),
    email: genEmail(),
    address: genAddress(areaInfo),
  };
}

// ─── UI 逻辑 ───
let results = [];

function buildCheckboxes() {
  const wrap = document.getElementById('fieldChecks');
  FIELDS.forEach(f => {
    const lbl = document.createElement('label');
    const unchecked = ['birthday', 'bankName', 'bankCard'].includes(f.key);
    lbl.innerHTML = `<input type="checkbox" value="${f.key}" ${unchecked ? '' : 'checked'}> ${f.label}`;
    wrap.appendChild(lbl);
  });
  const all = document.createElement('label');
  all.style.cssText = 'margin-left:auto;color:#4f46e5;font-weight:600';
  all.innerHTML = `<input type="checkbox" id="toggleAll" checked> 全选`;
  all.querySelector('input').addEventListener('change', e => {
    wrap.querySelectorAll('input[type=checkbox]:not(#toggleAll)').forEach(cb => cb.checked = e.target.checked);
  });
  wrap.appendChild(all);
}

function getSelectedFields() {
  return [...document.querySelectorAll('#fieldChecks input:checked:not(#toggleAll)')].map(cb => cb.value);
}

function generate() {
  const count = parseInt(document.getElementById('batchCount').value);
  const fields = getSelectedFields();
  if (!fields.length) { showToast('请至少选择一个字段'); return; }
  const settings = getCustomSettings();
  results = Array.from({ length: count }, () => genOne(settings));
  renderTable(fields);
}

function renderTable(fields) {
  const area = document.getElementById('resultArea');
  if (!results.length) { area.innerHTML = '<div class="empty">暂无数据</div>'; document.getElementById('resultCount').textContent = ''; return; }
  const selFields = fields || getSelectedFields();
  document.getElementById('resultCount').textContent = `共 ${results.length} 条`;
  let html = '<div class="table-wrap"><table class="result-table"><thead><tr><th>#</th>';
  selFields.forEach(k => { html += `<th>${FIELDS.find(f=>f.key===k).label}</th>`; });
  html += '</tr></thead><tbody>';
  results.forEach((row, i) => {
    html += `<tr><td>${i + 1}</td>`;
    selFields.forEach(k => { html += `<td class="copy-cell" title="点击复制" onclick="copyCell(this)">${row[k]}</td>`; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  area.innerHTML = html;
}

function copyCell(td) {
  navigator.clipboard.writeText(td.textContent).then(() => showToast('已复制: ' + td.textContent));
}

function clearAll() {
  results = [];
  document.getElementById('resultArea').innerHTML = '<div class="empty">点击「生成数据」开始</div>';
  document.getElementById('resultCount').textContent = '';
}

function exportCSV() {
  if (!results.length) { showToast('请先生成数据'); return; }
  const fields = getSelectedFields();
  const headers = fields.map(k => FIELDS.find(f=>f.key===k).label);
  let csv = '﻿' + headers.join(',') + '\n';
  results.forEach(row => {
    csv += fields.map(k => `"${row[k]}"`).join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `测试数据_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV 已下载');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ─── 初始化 ───
buildCheckboxes();
buildAddrSelects();
generate();
</script>
